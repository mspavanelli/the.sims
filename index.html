<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icons/casa-icone.svg" type="image/svg+xml" />
    <!-- viewport-fit=cover: sem isso o env(safe-area-inset-*) devolve zero e o
         app instalado ganha faixas pretas em vez de ocupar a tela inteira. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,600&display=swap"
    />
    <meta
      name="description"
      content="The Sims — um cantinho lúdico para a jornada de um casal."
    />
    <meta name="theme-color" content="#17c08a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- O céu passa por trás do relógio: é o que faz o app ocupar a tela
         inteira, e é o que torna as safe areas obrigatórias logo abaixo. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Sem isto o iOS escreve o <title> inteiro, emoji incluso, debaixo do
         ícone na tela de início. -->
    <meta name="apple-mobile-web-app-title" content="The Sims" />
    <title>The Sims 💚</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
